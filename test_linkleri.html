        li:hover {

        }
        a {
            color: #00796b;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1em;
        }
        a:hover {
            text-decoration: underline;
        }
        p {
            margin: 8px 0 0 0;
            color: #555;
        }
        footer {
            text-align: center;
            padding: 15px;
